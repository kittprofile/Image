<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #070708;
    font-family: 'Bebas Neue', sans-serif;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGlow1" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#070708" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow2" cx="85%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#070708" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow3" cx="10%" cy="15%" r="30%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#070708" stop-opacity="0"/>
    </radialGradient>

    <!-- Brand text gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Stat number gradient -->
    <linearGradient id="statGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>

    <!-- Noise filter -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#070708"/>

  <!-- Grid texture -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow orbs -->
  <rect width="1200" height="630" fill="url(#bgGlow1)"/>
  <rect width="1200" height="630" fill="url(#bgGlow2)"/>
  <rect width="1200" height="630" fill="url(#bgGlow3)"/>

  <!-- Subtle top border line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- Decorative vertical accent line left -->
  <rect x="80" y="60" width="1" height="510" fill="rgba(124,58,237,0.15)"/>

  <!-- Decorative vertical accent line right -->
  <rect x="1120" y="60" width="1" height="510" fill="rgba(124,58,237,0.15)"/>

  <!-- Top label -->
  <text x="120" y="115" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="600"
    fill="#7c3aed" letter-spacing="4" text-anchor="start">JAKARTA · INDONESIA</text>

  <!-- Decorative dot after label -->
  <circle cx="330" cy="110" r="3" fill="#7c3aed" opacity="0.6"/>

  <!-- Main brand name -->
  <text x="120" y="250" font-family="'Bebas Neue', sans-serif" font-size="118" fill="url(#brandGrad)"
    letter-spacing="2">REELS</text>
  <text x="120" y="355" font-family="'Bebas Neue', sans-serif" font-size="118" fill="url(#accentGrad)"
    letter-spacing="2">AGENCY</text>

  <!-- "Creative" small label -->
  <text x="124" y="390" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="300"
    fill="rgba(255,255,255,0.35)" letter-spacing="6">CREATIVE</text>

  <!-- Divider line -->
  <rect x="120" y="415" width="340" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Tagline -->
  <text x="120" y="448" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="400"
    fill="rgba(255,255,255,0.45)" letter-spacing="0.5">High-retention short-form content untuk brands &amp; creators.</text>

  <!-- ─── RIGHT SIDE: Stats ─── -->
  <!-- Stats container background -->
  <rect x="760" y="140" width="360" height="350" rx="20" ry="20"
    fill="rgba(20,20,24,0.7)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Subtle glow inside stats box -->
  <radialGradient id="cardGlow" cx="50%" cy="0%" r="70%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </radialGradient>
  <rect x="760" y="140" width="360" height="350" rx="20" ry="20" fill="url(#cardGlow)"/>

  <!-- Stats label -->
  <text x="940" y="185" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="600"
    fill="#7c3aed" letter-spacing="3.5" text-anchor="middle">OUR NUMBERS</text>

  <!-- Divider inside card -->
  <rect x="800" y="200" width="280" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Stat 1: Clients -->
  <text x="940" y="270" font-family="'Bebas Neue', sans-serif" font-size="72"
    fill="url(#statGrad)" text-anchor="middle" letter-spacing="1">50+</text>
  <text x="940" y="295" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="500"
    fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="3">CLIENTS</text>

  <!-- Mid divider -->
  <rect x="800" y="315" width="280" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Stat 2: Videos Delivered -->
  <text x="940" y="385" font-family="'Bebas Neue', sans-serif" font-size="72"
    fill="url(#statGrad)" text-anchor="middle" letter-spacing="1">1200+</text>
  <text x="940" y="410" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="500"
    fill="rgba(255,255,255,0.35)" text-anchor="middle" letter-spacing="3">VIDEOS DELIVERED</text>

  <!-- Bottom divider inside card -->
  <rect x="800" y="430" width="280" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Stat 3: Retention -->
  <text x="940" y="460" font-family="'Bebas Neue', sans-serif" font-size="24"
    fill="rgba(167,139,250,0.7)" text-anchor="middle" letter-spacing="1">87% AVG. RETENTION</text>

  <!-- Bottom bar / URL hint -->
  <rect x="0" y="598" width="1200" height="32" fill="rgba(0,0,0,0.4)"/>
  <text x="120" y="619" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="400"
    fill="rgba(255,255,255,0.25)" letter-spacing="1">reelsagency.id</text>

  <!-- Purple dot accent -->
  <circle cx="710" cy="315" r="4" fill="#7c3aed" opacity="0.5"/>
  <circle cx="710" cy="315" r="8" fill="#7c3aed" opacity="0.1"/>

</svg>
</body>
</html>
